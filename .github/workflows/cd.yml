name: Build & Deploy to GKE

on:
  push:
    branches: [master]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  checks: write

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       europe-west1
  CLUSTER:      kolor-cluster
  CLUSTER_ZONE: europe-west1-b
  REGISTRY:     europe-west1-docker.pkg.dev
  REPO:         kolor-repo

jobs:
  test-spring:
    name: Test Spring Boot App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Spring Boot tests
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Spring Boot Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spring-test-results
          path: target/surefire-reports/

  test-python:
    name: Test Python Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        working-directory: ./python-service
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r test-requirements.txt

      - name: Run Python tests
        working-directory: ./python-service
        run: |
          python -m pytest

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results
          path: python-service/test-results.xml

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: python-service/coverage.xml

  build-spring:
    name: Build Spring App
    runs-on: ubuntu-latest
    needs: test-spring

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push Spring Boot image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-spring-app:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-spring-app:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-spring-app:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-spring-app:latest

  # ─────────────────────────────────────────────
  # 2. Build & push Python service image
  # ─────────────────────────────────────────────
  build-python:
    name: Build Python Service
    runs-on: ubuntu-latest
    needs: test-python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push Python image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-python-service:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-python-service:latest \
            ./python-service
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-python-service:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/kolor-python-service:latest

